version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: adari_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: adari
      POSTGRES_PASSWORD: adari_dev_secret
      POSTGRES_DB: adari_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U adari -d adari_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: adari_redis
    restart: unless-stopped
    command: redis-server --requirepass adari_redis_secret --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'adari_redis_secret', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
